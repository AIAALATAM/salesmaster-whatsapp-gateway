version: "3.8"

services:
  evolution-db:
    image: postgres:16-alpine
    container_name: evolution-db
    restart: always
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: evolution_admin
      POSTGRES_PASSWORD: ${EVOLUTION_POSTGRES_PASSWORD}
      POSTGRES_DB: evolution_api
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_evolution_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution_admin -d evolution_api"]
      interval: 10s
      timeout: 5s
      retries: 5

  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution-api
    restart: always
    env_file:
      - ../.env
    ports:
      - "127.0.0.1:8085:8085"
    depends_on:
      evolution-db:
        condition: service_healthy
    environment:
      - SERVER_PORT=8085
      - SERVER_URL=${PUBLIC_BASE_URL}
      - API_VERSION=v2
      - DELAY_MESSAGE=1000
      - AUTH_API_KEY=${EVOLUTION_API_KEY}
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution_admin:${EVOLUTION_POSTGRES_PASSWORD}@evolution-db:5432/evolution_api?schema=public
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
      - WEBSOCKET_ENABLED=true
    volumes:
      - evolution_instances:/evolution/instances

  gateway-service:
    build:
      context: ../gateway-service
      dockerfile: Dockerfile
    container_name: ghl-whatsapp-gateway
    restart: always
    env_file:
      - ../.env
    ports:
      - "127.0.0.1:8086:8086"
    depends_on:
      - evolution-api
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8086/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_evolution_data:
  evolution_instances:
